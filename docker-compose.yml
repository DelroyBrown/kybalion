# Local development stack: PostgreSQL + Django API + Vite dev server.
#   docker compose up --build
# Frontend: http://localhost:5173   API: http://localhost:8000/api
# Admin:    http://localhost:8000/admin (create a superuser first — see README)

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kybalion
      POSTGRES_USER: kybalion
      POSTGRES_PASSWORD: kybalion-dev-only
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kybalion']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_content &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SECRET_KEY: dev-only-secret-key-change-in-production
      DJANGO_DEBUG: 'True'
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DATABASE_NAME: kybalion
      DATABASE_USER: kybalion
      DATABASE_PASSWORD: kybalion-dev-only
      DATABASE_HOST: db
      DATABASE_PORT: '5432'
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - '8000:8000'
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    ports:
      - '5173:5173'
    depends_on:
      - backend

volumes:
  postgres-data:
